syntax = "proto3";

package juno.email;

import "identifiers.proto";

service EmailService {
  rpc sendEmail(SendEmailRequest) returns (SendEmailResponse);
  rpc authenticateDomain(AuthenticateDomainRequest) returns (AuthenticateDomainResponse);
}

message SendEmailRequest {
    repeated EmailRecipient recipients = 1;
    EmailSender sender = 2;
    repeated EmailContent content = 3;
}
  
message SendEmailResponse { bool success = 1; }

message EmailRecipient {
    string email = 1;
    optional string name = 2;
}

message EmailSender {
    string email = 1;
    optional string name = 2;
}

message EmailContent {
    string type = 1;
    string value = 2;
}

message AuthenticateDomainRequest {
    string domain = 1;
    string subdomain = 2;
}

message AuthenticateDomainResponse {
    int64 id = 1;
    string valid = 2;
    SendGridDnsRecords records = 3;
    int32 statusCode = 4;
}

message SendGridDnsRecords {
    SendGridRecord mail_cname = 1;
    SendGridRecord dkim1 = 2;
    SendGridRecord dkim2 = 3;
}

message SendGridRecord {
    bool valid = 1;
    string type = 2;
    string host = 3;
    string data = 4;
}