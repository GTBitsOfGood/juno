syntax = "proto3";

package juno.email;

import "identifiers.proto";

service EmailService {
  rpc sendEmail(SendEmailRequest) returns (SendEmailRequestResponse);
  rpc registerSender(RegisterSenderRequest) returns (RegisterSenderResponse);
}

message SendEmailRequest {
    string destination = 1;
    string subject = 2;
    string body = 3;
}

message SendEmailRequestResponse {
    bool success = 1;
}

message RegisterSenderRequest {
    string from_email = 1;
    string from_name = 2;
    string reply_to = 3;
}

message RegisterSenderResponse {
    int32 status_code = 1;
    string message = 2;
}